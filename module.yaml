# 模块清单（架构文档 7.3）。主站安装时读取此文件做校验、构建与注册。
apiVersion: personal-tools/v1
id: welcome
name: 欢迎小屋
description: 登录后向你问好的示例模块（同时作为模块开发模板）
version: 1.0.0
category: 工具
icon: hand-heart

source:
  type: github

compatibility:
  main_api: ">=1.0.0 <2.0.0"
  module_sdk: ">=1.0.0 <2.0.0"

entry:
  type: iframe
  path: /tools/welcome
  frontend_dist: frontend/dist

display:
  mode: embedded
  allow_fullscreen: true
  allow_new_window: true
  min_width: 640
  min_height: 420

# 运行模式（模块分级）：决定主站如何部署本模块。
#   static            纯前端：只构建 frontend/dist，不起后端、不建库（如计算器、随机选择器）
#   platform_storage  纯前端 + 平台托管存储：用主站 storage API 存少量 JSON，无需自带后端（如 Todo、日记）
#   container         常驻后端容器：当前模式，需服务端能力/密钥/数据库时用
#   lazy_container    懒启动容器：偶尔使用、可接受冷启动（懒启动为后续阶段，目前按常驻容器运行）
# 不声明时按旧契约推断：backend.enabled=true → container，否则 → static。
# resources / idle_timeout 仅容器模式生效；resources 会被主站上限钳制。
runtime:
  mode: container
  resources:
    memory: 256m
    cpus: 0.5
    pids: 128
  # idle_timeout: 1800   # 仅 lazy_container 用

backend:
  enabled: true
  type: fastapi
  dockerfile: backend/Dockerfile
  internal_port: 8000
  health_path: /health

# 网关只放行这些业务路径（前缀匹配）。/health、/manifest 等内部接口不经网关暴露。
# 默认 fail-closed：未命中 allow_paths 的路径一律拒绝。如确需放行全部，必须显式声明
# gateway.legacy_allow_all: true（强烈不建议，应始终按需收敛）。
gateway:
  allow_paths:
    - /greeting

# 本模块无需数据库；需要时改为 enabled: true 并提供 backend/alembic 迁移（见 README）
database:
  enabled: false

auth:
  required: true              # 需要登录：未登录不能进入，主站网关会鉴权
  user_context: signed_header # 通过主站签名 Header 获取当前用户
  anonymous_persistence: false
  # 主站默认下发的用户上下文：sub/uid/uid_display/username/nickname/display_name/avatar_url/roles。
  # 邮箱属敏感信息，按需获取：仅当下面置为 true，主站才会在签名上下文里附带 email。
  request_email: false

permissions:
  - welcome:read

features:
  supports_settings: false
  supports_upload: false
  supports_export: false
  supports_history: false
